  <!-- === WORDMARK === -->
  <text x="112" y="46" font-family="Georgia, serif" font-size="11" fill="#8B6040" letter-spacing="4" opacity="0.75" style="fill:rgb(139, 96, 64);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.75;font-family:Georgia, serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">THE</text>
  <text x="109" y="84" font-family="Georgia, serif" font-size="42" fill="#5C3A1E" letter-spacing="1" style="fill:rgb(92, 58, 30);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:42px;font-weight:400;text-anchor:start;dominant-baseline:auto">Keepsake</text>
  <text x="112" y="102" font-family="Georgia, serif" font-size="11" fill="#B07040" letter-spacing="2.5" font-style="italic" style="fill:rgb(176, 112, 64);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:11px;font-weight:400;font-style:italic;text-anchor:start;dominant-baseline:auto">gifts worth holding onto</text>

